site_name: AI Combine
site_description: Self-hosted multi-agent combine built on cheap LLMs
repo_url: https://github.com/Gyxer513/ai-combine
repo_name: Gyxer513/ai-combine
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    # navigation.instant is incompatible with the i18n language switcher — omitted
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Overview: Обзор
            Quickstart: Быстрый старт
            Agents: Агенты
            Architecture: Архитектура
            Security: Безопасность

nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - Agents: agents.md
  - Architecture: architecture.md
  - Security: security.md

# ============================================================
# AI Combine — docker-compose
#
# Stage 1 (infrastructure, started by default):
#   docker compose up -d litellm qdrant embeddings openwebui
#
# Stage 2+ (application, app profile):
#   docker compose --profile app up -d
#   docker compose --profile telegram up -d
#   docker compose --profile indexer up -d
# ============================================================

services:
  # --- LLM proxy (Stage 1) ---
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports: ["4000:4000"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Vector store (Stage 1, populated in Stage 3) ---
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Embeddings are obtained via API (Alibaba text-embedding-v4 behind LiteLLM) —
  # self-hosted TEI/BGE-M3 was removed to avoid eating RAM on a low-spec server.

  # --- Web search for agents (SearXNG, self-hosted) ---
  searxng:
    image: searxng/searxng:latest
    ports: ["8888:8080"]
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped

  # --- Web chat (Stage 1) ---
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["3000:8080"]
    volumes:
      - ./data/openwebui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
    depends_on:
      - litellm
    restart: unless-stopped

  # --- Orchestrator (Stage 2, app profile) ---
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    # Bind ONLY on localhost: the orchestrator invokes agents that have access to the
    # GitHub PAT / RAG / sandbox-broker — it must not be exposed publicly. LAN access
    # should go through a reverse proxy with TLS+auth. On top of that, a mandatory
    # Bearer token (ORCHESTRATOR_API_TOKEN) is checked on /chat, /agents, /v1/*.
    ports: ["127.0.0.1:8000:8000"]
    env_file: .env
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - BROKER_URL=http://sandbox-broker:9000
      - DB_PATH=/app/data/ai_combine.db
    # The orchestrator NO LONGER has docker.sock: commands go to sandbox-broker over HTTP.
    # An RCE in the orchestrator (injection) no longer grants direct access to Docker/host.
    volumes:
      # SQLite DB (conversation history, notes, metrics) survives restarts.
      - ./data:/app/data
    depends_on:
      - litellm
      - qdrant
      - searxng
      - sandbox-broker
    profiles: ["app"]
    restart: unless-stopped

  # --- Sandbox broker (Stage 6): the ONLY service with docker.sock ---
  # A tiny privileged surface: a fixed API {profile, command}, with hardening and
  # allowlist hardcoded inside. The port is NOT published externally —
  # it is reachable only from the docker network (by the orchestrator).
  sandbox-broker:
    build:
      context: .
      dockerfile: docker/broker.Dockerfile
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["app"]
    restart: unless-stopped

  # --- Telegram bot (Stage 5, telegram profile) ---
  # No depends_on on orchestrator: the bot only polls Telegram and calls the
  # orchestrator over HTTP on each message (with retry) — it isn't needed at startup.
  # A cross-profile depends_on would otherwise break running `--profile telegram` alone.
  telegram-bot:
    build:
      context: .
      dockerfile: docker/telegram.Dockerfile
    env_file: .env
    profiles: ["telegram"]
    restart: unless-stopped

  # --- RAG indexer (Stage 3) ---
  # In the app profile it runs in a loop (RAG_INDEX_INTERVAL_MIN, default 60 min) —
  # keeping the knowledge base fresh. One-off run:
  #   docker compose run --rm -e RAG_INDEX_INTERVAL_MIN=0 rag-indexer
  rag-indexer:
    build:
      context: .
      dockerfile: docker/indexer.Dockerfile
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - RAG_INDEX_INTERVAL_MIN=${RAG_INDEX_INTERVAL_MIN:-60}
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - litellm
    profiles: ["app", "indexer"]
    restart: unless-stopped

  # --- Deck worker (autonomy) ---
  # Pulls tasks from Nextcloud Deck and runs them with agents via the orchestrator.
  # In the app profile it polls the board every DECK_POLL_INTERVAL_MIN (default 2 min).
  # No depends_on on orchestrator (it calls over HTTP with retry on each tick),
  # so that `--profile deck` can be brought up on its own.
  deck-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - DECK_POLL_INTERVAL_MIN=${DECK_POLL_INTERVAL_MIN:-2}
    profiles: ["app", "deck"]
    restart: unless-stopped

  # --- Research worker (assistant: income research) ---
  # Same worker image, different entrypoint. Token-bounded: deterministic
  # search + one cheap LLM call per run -> cards on the "Ideas" Deck board.
  # Default once per day (RESEARCH_INTERVAL_MIN=1440). One-off run:
  #   docker compose run --rm -e RESEARCH_INTERVAL_MIN=0 research-worker
  research-worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: ["python", "-m", "src.research_worker.main"]
    env_file: .env
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - SEARXNG_URL=http://searxng:8080
      - RESEARCH_INTERVAL_MIN=${RESEARCH_INTERVAL_MIN:-1440}
    profiles: ["app", "research"]
    restart: unless-stopped

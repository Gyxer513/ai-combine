# ============================================================
# AI Combine — docker-compose
#
# Этап 1 (инфра, запускается по умолчанию):
#   docker compose up -d litellm qdrant embeddings openwebui
#
# Этап 2+ (приложение, профиль app):
#   docker compose --profile app up -d
#   docker compose --profile telegram up -d
#   docker compose --profile indexer up -d
# ============================================================

services:
  # --- LLM-прокси (Этап 1) ---
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports: ["4000:4000"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Векторное хранилище (Этап 1, наполняется на Этапе 3) ---
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Embeddings берутся через API (Alibaba text-embedding-v4 за LiteLLM) —
  # self-hosted TEI/BGE-M3 убран, чтобы не жрать RAM на слабом сервере.

  # --- Веб-поиск для агентов (SearXNG, self-hosted) ---
  searxng:
    image: searxng/searxng:latest
    ports: ["8888:8080"]
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped

  # --- Веб-чат (Этап 1) ---
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["3000:8080"]
    volumes:
      - ./data/openwebui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
    depends_on:
      - litellm
    restart: unless-stopped

  # --- Оркестратор (Этап 2, профиль app) ---
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - BROKER_URL=http://sandbox-broker:9000
      - DB_PATH=/app/data/ai_combine.db
    # docker.sock у оркестратора БОЛЬШЕ НЕТ: команды идут в sandbox-broker по HTTP.
    # RCE в оркестраторе (инъекция) теперь не даёт прямого доступа к Docker/хосту.
    volumes:
      # SQLite-БД (история диалогов, заметки, метрики) переживает рестарт.
      - ./data:/app/data
    depends_on:
      - litellm
      - qdrant
      - searxng
      - sandbox-broker
    profiles: ["app"]
    restart: unless-stopped

  # --- Sandbox-broker (Этап 6): ЕДИНСТВЕННЫЙ с docker.sock ---
  # Крошечная привилегированная поверхность: фиксированный API {profile, command},
  # hardening и allowlist захардкожены внутри. Наружу порт НЕ публикуется —
  # доступен только из docker-сети (оркестратору).
  sandbox-broker:
    build:
      context: .
      dockerfile: docker/broker.Dockerfile
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["app"]
    restart: unless-stopped

  # --- Telegram-бот (Этап 5, профиль telegram) ---
  # Без depends_on на orchestrator: бот только поллит Telegram и ходит в
  # оркестратор по HTTP при сообщении (с ретраем) — на старте тот не нужен.
  # Cross-profile depends_on иначе ломал бы `--profile telegram` в одиночку.
  telegram-bot:
    build:
      context: .
      dockerfile: docker/telegram.Dockerfile
    env_file: .env
    profiles: ["telegram"]
    restart: unless-stopped

  # --- RAG-индексатор (Этап 3) ---
  # В профиле app работает циклом (RAG_INDEX_INTERVAL_MIN, дефолт 60 мин) —
  # база знаний остаётся свежей. Разовый прогон:
  #   docker compose run --rm -e RAG_INDEX_INTERVAL_MIN=0 rag-indexer
  rag-indexer:
    build:
      context: .
      dockerfile: docker/indexer.Dockerfile
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LITELLM_BASE_URL=http://litellm:4000/v1
      - RAG_INDEX_INTERVAL_MIN=${RAG_INDEX_INTERVAL_MIN:-60}
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - litellm
    profiles: ["app", "indexer"]
    restart: unless-stopped

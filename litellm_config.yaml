# ============================================================
# AI Combine — LiteLLM Proxy config (final layout)
# A single OpenAI-compatible API over Alibaba Model Studio + OpenRouter.
# All agents and frontends call http://litellm:4000/v1 with LITELLM_MASTER_KEY.
# ============================================================

model_list:
  # === Alibaba dashscope-intl (Qwen family) ===
  - model_name: qwen-max
    litellm_params:
      model: openai/qwen3-max
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
  - model_name: qwen-plus
    litellm_params:
      model: openai/qwen-plus
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
  - model_name: qwen-flash
    litellm_params:
      model: openai/qwen-flash
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
  - model_name: qwen-coder
    litellm_params:
      model: openai/qwen3-coder-plus
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY

  # === Alibaba: third-party models GLM / DeepSeek ===
  # IMPORTANT: contrary to the old assumption about a separate MaaS workspace URL,
  # for this account GLM-5.1 and DeepSeek are served directly via dashscope-intl
  # (the same key as Qwen). Verified with curl: the MaaS workspace endpoint returns 401.
  - model_name: glm-5.1
    litellm_params:
      model: openai/glm-5.1
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
      extra_body:
        enable_thinking: true # default for recon — deep reasoning
  - model_name: glm-5.1-fast
    litellm_params:
      model: openai/glm-5.1
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
      extra_body:
        enable_thinking: false # no thinking — faster, cheaper (coder plan)
  - model_name: deepseek-v3
    litellm_params:
      # On dashscope-intl the current id is deepseek-v3.2 (v3/v3.1/r1 return 404).
      model: openai/deepseek-v3.2
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY

  # === Embeddings (Alibaba API, for RAG) ===
  # Via API, without a local TEI/BGE-M3 — saving RAM on a low-spec server.
  - model_name: embed
    litellm_params:
      model: openai/text-embedding-v4
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY

  # === OpenRouter free ===
  - model_name: nemotron-super-free
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: owl-alpha-free
    litellm_params:
      model: openrouter/openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # === OpenRouter paid (optional) ===
  - model_name: claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.5
      api_key: os.environ/OPENROUTER_API_KEY

# Per-agent fallback chains are implemented in the orchestrator via Pydantic AI
# FallbackModel (see agents/*.py), not here: LiteLLM fallbacks are keyed by
# real model_name values, not by agent names. Here we keep only retry/timeout.
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 60

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

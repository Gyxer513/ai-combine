# ============================================================
# AI Combine — LiteLLM Proxy конфиг (финальная раскладка)
# Единый OpenAI-совместимый API над Alibaba Model Studio + OpenRouter.
# Все агенты и фронтенды ходят в http://litellm:4000/v1 с LITELLM_MASTER_KEY.
# ============================================================

model_list:
  # === Alibaba dashscope-intl (Qwen-семейство) ===
  - model_name: qwen-max
    litellm_params:
      model: openai/qwen3-max
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
  - model_name: qwen-plus
    litellm_params:
      model: openai/qwen-plus
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
  - model_name: qwen-flash
    litellm_params:
      model: openai/qwen-flash
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
  - model_name: qwen-coder
    litellm_params:
      model: openai/qwen3-coder-plus
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY

  # === Alibaba: сторонние модели GLM / DeepSeek ===
  # ВАЖНО: вопреки старому предположению про отдельный MaaS-workspace URL,
  # для этого аккаунта GLM-5.1 и DeepSeek раздаются прямо через dashscope-intl
  # (тот же ключ, что у Qwen). Проверено curl'ом: MaaS-workspace эндпоинт даёт 401.
  - model_name: glm-5.1
    litellm_params:
      model: openai/glm-5.1
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
      extra_body:
        enable_thinking: true # дефолт для Кощея — глубокое reasoning
  - model_name: glm-5.1-fast
    litellm_params:
      model: openai/glm-5.1
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY
      extra_body:
        enable_thinking: false # без thinking — быстрее, дешевле (Левша-план)
  - model_name: deepseek-v3
    litellm_params:
      # На dashscope-intl актуальный id — deepseek-v3.2 (v3/v3.1/r1 дают 404).
      model: openai/deepseek-v3.2
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY

  # === Embeddings (Alibaba API, для RAG) ===
  # Через API, без локального TEU/BGE-M3 — экономим RAM на слабом сервере.
  - model_name: embed
    litellm_params:
      model: openai/text-embedding-v4
      api_base: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/ALIBABA_API_KEY

  # === OpenRouter free ===
  - model_name: nemotron-super-free
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY
  - model_name: owl-alpha-free
    litellm_params:
      model: openrouter/openrouter/owl-alpha
      api_key: os.environ/OPENROUTER_API_KEY

  # === OpenRouter платные (опционально) ===
  - model_name: claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.5
      api_key: os.environ/OPENROUTER_API_KEY

# Пер-агентные fallback-цепочки реализованы в оркестраторе через Pydantic AI
# FallbackModel (см. agents/*.py), а не здесь: LiteLLM-fallbacks ключуются по
# реальным model_name, а не по именам агентов. Тут оставляем только retry/timeout.
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 60

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

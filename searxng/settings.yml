# SearXNG — minimal config for self-hosted web search by the agents.
# The JSON format is enabled (off by default) — otherwise ?format=json returns 403.
use_default_settings: true

server:
  # secret_key is required. A static one is fine for local use; on production use your own.
  secret_key: "ai-combine-searxng-local-secret"
  # limiter=false: allow programmatic access from the orchestrator without the anti-bot limit.
  limiter: false
  image_proxy: true

search:
  # Enable json — without it web_search can't parse the response.
  formats:
    - html
    - json
  # Default language for the agents' queries.
  default_lang: "ru"
